<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وثيقة اعتماد مهني</title>
    <style>
        /* إزالة الهوامش وجعل الخلفية رمادي فاتح لتمييز الصورة */
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ضبط حجم الصورة عشان تتناسب مع أي شاشة (موبايل أو كمبيوتر) */
        img {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); /* إضافة ظل خفيف للصورة */
        }
    </style>
</head>
<body>

    <!-- استدعاء الصورة -->
    <img src="photo.jpg" alt="وثيقة اعتماد">

</body>
</html>
